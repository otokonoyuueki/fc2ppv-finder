<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>男の有益 fc2ppv finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #e8c547;
    --accent2: #c47e2a;
    --text: #e0e0e0;
    --muted: #555;
    --card-bg: #141414;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

  header { margin-bottom: 32px; }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 10vw, 4rem);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

  .tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .tab {
    flex: 1; padding: 11px; text-align: center; font-size: 0.8rem;
    cursor: pointer; background: var(--surface); color: var(--muted);
    transition: all 0.15s; letter-spacing: 1px; border: none; font-family: 'Noto Sans JP', sans-serif;
  }

  .tab.active { background: var(--accent); color: #000; font-weight: 500; }
  .tab:not(.active):hover { color: var(--text); }

  .panel { display: none; }
  .panel.active { display: block; }

  label { display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 14px;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #333; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(232,197,71,0.03); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .drop-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .drop-text { font-size: 0.85rem; color: var(--muted); line-height: 1.8; }
  .drop-hint { font-size: 0.72rem; color: #333; margin-top: 6px; }

  .preview-wrap { position: relative; margin-top: 16px; }
  .preview-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); display: block; }
  .preview-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.7); color: #fff; border: none;
    border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
  }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }

  button {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: #000; flex: 1; letter-spacing: 1px; }
  .btn-primary:hover:not(:disabled) { background: #f5d45a; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: #444; }

  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 0.85rem;
    color: var(--muted);
    animation: fadeIn 0.2s ease;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg) } }

  .stats {
    display: none;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeIn 0.3s ease;
  }

  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .divider { width: 1px; height: 36px; background: var(--border); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 12px;
    animation: slideUp 0.3s ease both;
    transition: border-color 0.15s, transform 0.15s;
  }

  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-num { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }

  .card-links { display: flex; flex-direction: column; gap: 5px; }

  .link-btn {
    display: block; text-align: center; font-size: 0.7rem;
    padding: 5px 8px; border-radius: 4px; text-decoration: none;
    font-weight: 500; letter-spacing: 0.5px; transition: all 0.15s;
  }

  .link-google { background: rgba(232,197,71,0.12); color: var(--accent); border: 1px solid rgba(232,197,71,0.25); }
  .link-google:hover { background: rgba(232,197,71,0.22); }
  .link-x { background: rgba(255,255,255,0.04); color: #888; border: 1px solid #222; }
  .link-x:hover { color: var(--text); border-color: #444; }

  .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 0.85rem; line-height: 1.8; display: none; }
  .empty .icon { font-size: 2rem; margin-bottom: 12px; }
  .hint { font-size: 0.72rem; color: #333; margin-top: 8px; line-height: 1.6; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <header>
    <div class="logo">男の有益 FC2PPV FINDER</div>
    <div class="tagline">テキスト貼り付け ／ スクショ読み取り → ワンクリック検索</div>

  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('text')">📝 テキスト貼り付け</button>
    <button class="tab" onclick="switchTab('image')">🖼 スクショ読み取り</button>
  </div>

  <!-- テキストパネル -->
  <div id="panel-text" class="panel active">
    <label>ツイートのテキストをペースト</label>
    <textarea id="input" placeholder="【今日のお勧め】&#10;3099039&#10;3381983&#10;3131225&#10;..."></textarea>
    <p class="hint">💡 ツイートを長押し →「テキストをコピー」→ここに貼り付け</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="extractFromText()">🔍 リンク化する</button>
      <button class="btn-secondary" onclick="clearAll()">クリア</button>
    </div>
  </div>

  <!-- 画像パネル -->
  <div id="panel-image" class="panel">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" onchange="onFileSelect(event)">
      <div class="drop-icon">📸</div>
      <div class="drop-text">スクショをここにドロップ<br>またはタップして選択</div>
      <div class="drop-hint">iPhoneスクショ・保存画像 OK</div>
    </div>
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="previewImg" class="preview-img" alt="preview">
      <button class="preview-remove" onclick="removeImage()">✕</button>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn-primary" id="analyzeBtn" onclick="extractFromImage()" disabled>🤖 AIで数字を読み取る</button>
      <button class="btn-secondary" onclick="clearAll()">クリア</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>AIが画像から数字を読み取っています...</span>
  </div>

  <div class="stats" id="stats">
    <div>
      <div class="stat-num" id="count">0</div>
      <div class="stat-label">件の品番を検出</div>
    </div>
    <div class="divider"></div>
    <div style="font-size:0.75rem; color: var(--muted); line-height:1.8">
      Google → Google検索結果<br>
      X → Xで品番を検索
    </div>
  </div>

  <div id="empty" class="empty">
    <div class="icon">🔢</div>
    7桁の数字が見つかりませんでした<br>
    テキストや画像を確認して再試行してください
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
let currentImageBase64 = null;
let currentImageType = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'image'));
  });
  document.getElementById('panel-text').classList.toggle('active', tab === 'text');
  document.getElementById('panel-image').classList.toggle('active', tab === 'image');
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    currentImageBase64 = dataUrl.split(',')[1];
    currentImageType = file.type || 'image/jpeg';
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('analyzeBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  currentImageBase64 = null;
  currentImageType = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fileInput').value = '';
}

async function extractFromImage() {
  if (!currentImageBase64) return;
  showLoading(true);
  clearResults();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImageBase64 } },
            { type: 'text', text: 'この画像に含まれる7桁の数字をすべて抽出してください。数字だけをスペース区切りで返してください。7桁でない数字は含めないでください。数字が見つからない場合は「なし」とだけ返してください。' }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const nums = [...new Set((text.match(/\b\d{7}\b/g) || []))];

    if (nums.length === 0) showEmpty();
    else renderCards(nums);
  } catch (err) {
    alert('エラーが発生しました: ' + err.message);
  } finally {
    showLoading(false);
  }
}

function extractFromText() {
  const text = document.getElementById('input').value;
  const nums = [...new Set(text.match(/\b\d{7}\b/g) || [])];
  clearResults();
  if (nums.length === 0) showEmpty();
  else renderCards(nums);
}

function renderCards(nums) {
  const grid = document.getElementById('grid');
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('count').textContent = nums.length;

  nums.forEach(num => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-links">
        <a href="https://www.google.com/search?q=FC2-PPV-${num}" target="_blank" class="link-btn link-google">Googleで検索</a>
        <a href="https://twitter.com/search?q=FC2-PPV-${num}&f=top" target="_blank" class="link-btn link-x">Xで検索</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

function clearResults() {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
}

function showEmpty() { document.getElementById('empty').style.display = 'block'; }
function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

function clearAll() {
  clearResults();
  document.getElementById('input').value = '';
  removeImage();
}
</script>
</body>
</html>
